name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to "master" if your default branch is named master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        # Using "npm install" instead of "npm ci" prevents lockfile errors
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite builds static assets into the 'dist' folder
          branch: gh-pages # The target branch for GitHub Pages
